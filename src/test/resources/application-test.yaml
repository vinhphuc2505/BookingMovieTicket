spring:
  application:
    name: BookingMovieTicket

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_POST:5432}/${DATABASE_NAME_TEST:booking_test}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        javax:
          persistence:
            lock:
              timeout: 3000
#logging:
#  level:
#    org.hibernate.orm.jdbc.bind: TRACE
#    org.hibernate.SQL: DEBUG

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  cron:
    cleanup-seats: "0 0 */1 * * *"
    send-email: "0 * * * * *"

brevo:
  api-key: ${BREVO_API_KEY}
  url: ${BREVO_URL}


